{% extends "base.html" %}

{% block head_title %}Categories{% endblock %}

{% block content %}
<main class="content" role="main">
  <article class="post">
    <div class="article-image">
      <div class="post-image-image" style="background-image: url('{{ SITEURL }}/assets/img/storm.jpg')">
        Archive Image
      </div>
      <div class="post-meta">
        <h1 class="post-title">Archive: Categories</h1>
        <div style="text-align:center">
          <a href="#topofpage" class="topofpage"><i class="fa fa-angle-down"></i></a>
        </div>
      </div>
    </div>
    <section class="post-content">
      <a name="topofpage"></a>
      <ul class="posts">
        {% for category, articles in categories %}
          <li>
            <a class="post-link" href="{{ SITEURL }}/{{ category.url }}">{{ category }}</a>
            <span class="post-date"> ({{ articles | count }})</span>
          </li>
        {% endfor %}
      </ul>
    </section>
  </article>
</main>
{% endblock %}

{% block creative_commons %}{% endblock %}
