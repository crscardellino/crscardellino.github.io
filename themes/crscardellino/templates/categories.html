{% extends "base.html" %}

{% block head_title %}Categories{% endblock %}

{% block content %}
<main class="content" role="main">
  <article class="post">
    <div class="noarticleimage">
      <div class="post-meta">
        <h1 class="post-title">Categories</h1>
      </div>
    </div>
    <section class="post-content">
      <ul class="posts">
        {% for category, articles in categories %}
          <li>
            <a class="post-link" href="/{{ category.url }}">{{ category }}</a>
            <span class="post-date"> ({{ articles | count }})</span>
          </li>
        {% endfor %}
      </ul>
    </section>
  </article>
</main>
{% endblock %}
