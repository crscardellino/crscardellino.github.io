{% extends "base.html" %}

{% block head_title %}Tags{% endblock %}

{% block content %}
<main class="content" role="main">
  <article class="post">
    <div class="noarticleimage">
      <div class="post-meta">
        <h1 class="post-title">Tag Cloud</h1>
      </div>
    </div>
    <section class="post-content">
      <ul class="tagcloud">
        {% for tag in tag_cloud %}
          <li class="tag-{{ tag.1 }}">
            <a href="/{{ tag.0.url }}">{{ tag.0 }}</a>
          </li>
        {% endfor %}
      </ul>
    </section>
  </article>
</main>
{% endblock %}

{% block creative_commons %}{% endblock %}
