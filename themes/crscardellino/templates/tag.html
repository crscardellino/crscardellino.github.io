{% extends "base.html" %}

{% block head_title %}{{ tag }}{% endblock %}

{% block content %}
<main class="content" role="main">
  <article class="post">
    <div class="noarticleimage">
      <div class="post-meta">
        <h1 class="post-title">Tag: '{{ tag }}'</h1>
      </div>
    </div>
    <section class="post-content">
      <ul class="posts">
        {% for article in articles %}
          <li>
            <span class="post-date">{{ article.date.strftime('%b %-d, %Y') }}</span>
            <a class="post-link" href="{{ article.url }}">{{ article.title }}</a>
          </li>
        {% endfor %}
      </ul>
    </section>
  </article>
</main>
{% endblock %}
